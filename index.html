<title>Andolini — Costume Atelier</title>
<style>/* Andolini Design System — global entry point.
   Consumers link THIS file. It only @imports token layers. */

/* Andolini — Color tokens
   Built from the logo: warm sand (#CEBEA6) + white, grounded in a warm ink.
   The whole palette is a single warm-neutral family — no competing hues. */

:root {
  /* ── Sand: the brand neutral, tinted from the logo beige ── */
  --sand-50:  #FAF7F1;  /* warm paper — default page surface */
  --sand-100: #F3ECE0;
  --sand-200: #E8DCC8;
  --sand-300: #DACBAE;
  --sand-400: #CEBEA6;  /* ◆ BRAND — exact logo beige */
  --sand-500: #B9A687;
  --sand-600: #9C8A6C;
  --sand-700: #786A51;
  --sand-800: #54493A;

  /* ── Ink: warm near-blacks for type + dark surfaces ── */
  --ink-900: #1B1813;   /* primary text, dark sections */
  --ink-800: #2A2620;
  --ink-700: #3B352C;
  --ink-600: #564E42;

  /* ── Stone: warm greys for secondary text + hairlines ── */
  --stone-500: #6E665A;
  --stone-400: #908779;
  --stone-300: #B6AD9F;
  --stone-200: #D8D1C5;
  --stone-100: #ECE7DD;

  --white: #FFFFFF;

  /* ── Semantic aliases (use these in product code) ── */
  --bg-page:        var(--sand-50);
  --bg-raised:      var(--white);
  --bg-sunken:      var(--sand-100);
  --bg-inverse:     var(--ink-900);
  --bg-brand:       var(--sand-400);
  --bg-brand-soft:  var(--sand-200);

  --text-primary:   var(--ink-900);
  --text-secondary: var(--stone-500);
  --text-muted:     var(--stone-400);
  --text-inverse:   var(--sand-50);
  --text-on-brand:  var(--white);

  --border-hairline: var(--stone-200);
  --border-strong:   var(--ink-900);
  --border-brand:    var(--sand-400);

  --focus-ring: var(--ink-900);
}

:root {
  --font-display: 'Jost', system-ui, sans-serif;
  --font-body:    'Jost', system-ui, sans-serif;
  --font-serif:   'Cormorant Garamond', Georgia, serif;

  /* Weights */
  --fw-light: 300;   /* @kind other */
  --fw-regular: 400; /* @kind other */
  --fw-medium: 500;  /* @kind other */

  /* Type scale — fluid, expansive. Big jumps for editorial drama. */
  --fs-overline: 0.75rem;   /* 12 — wide-tracked labels */
  --fs-caption:  0.8125rem; /* 13 */
  --fs-body-sm:  0.9375rem; /* 15 */
  --fs-body:     1.0625rem; /* 17 */
  --fs-body-lg:  1.25rem;   /* 20 */
  --fs-h4:       1.5rem;    /* 24 */
  --fs-h3:       2rem;      /* 32 */
  --fs-h2:       2.75rem;   /* 44 */
  --fs-h1:       4rem;      /* 64 */
  --fs-display:  6rem;      /* 96 — hero */

  /* Line heights */
  --lh-tight: 1.05; /* @kind other */
  --lh-snug:  1.2;  /* @kind other */
  --lh-body:  1.6;  /* @kind other */

  /* Letter-spacing — the brand signature is WIDE tracking on display + labels */
  --ls-display: 0.18em;   /* matches ANDOLINI wordmark */
  --ls-heading: 0.06em;
  --ls-overline: 0.32em;  /* MADE IN ITALY treatment */
  --ls-body: 0.01em;
}

/* Andolini — Spacing & layout tokens
   An 8px base scale with generous, expansive top-end steps for airy layouts. */

:root {
  --space-0: 0;
  --space-1: 0.25rem;  /* 4 */
  --space-2: 0.5rem;   /* 8 */
  --space-3: 0.75rem;  /* 12 */
  --space-4: 1rem;     /* 16 */
  --space-5: 1.5rem;   /* 24 */
  --space-6: 2rem;     /* 32 */
  --space-7: 3rem;     /* 48 */
  --space-8: 4rem;     /* 64 */
  --space-9: 6rem;     /* 96 */
  --space-10: 8rem;    /* 128 — section rhythm */
  --space-11: 12rem;   /* 192 — expansive whitespace */

  /* Layout */
  --container-max: 1320px;
  --container-narrow: 760px;
  --gutter: var(--space-7);

  /* Radii — kept minimal & architectural. Pills only for chips/avatars. */
  --radius-none: 0;
  --radius-sm: 2px;
  --radius-md: 4px;
  --radius-lg: 8px;
  --radius-pill: 999px;
  --radius-circle: 50%;
}

/* Andolini — Effects: shadows, borders, transitions
   Restraint is the rule. Shadows are soft, warm-tinted, and rare —
   the brand leans on whitespace and hairlines, not elevation. */

:root {
  /* Hairlines are the primary separator */
  --border-thin: 1px solid var(--border-hairline);
  --border-ink:  1px solid var(--ink-900);

  /* Shadows — warm-tinted, very soft. Use sparingly (overlays, hover lift). */
  --shadow-xs: 0 1px 2px rgba(27, 24, 19, 0.04);
  --shadow-sm: 0 2px 8px rgba(27, 24, 19, 0.06);
  --shadow-md: 0 8px 24px rgba(27, 24, 19, 0.08);
  --shadow-lg: 0 24px 60px rgba(27, 24, 19, 0.12);

  /* Motion — slow, quiet, no bounce. Luxury restraint. */
  --ease-standard: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */
  --dur-fast: 160ms; /* @kind other */
  --dur-base: 280ms; /* @kind other */
  --dur-slow: 520ms; /* @kind other */

  --transition-base: all var(--dur-base) var(--ease-standard);
}

/* Andolini — base element styles & a few utility primitives.
   Light-touch resets so specimen cards and kits inherit the brand voice. */

*, *::before, *::after { box-sizing: border-box; }

body {
  margin: 0;
  font-family: var(--font-body);
  font-weight: var(--fw-regular);
  font-size: var(--fs-body);
  line-height: var(--lh-body);
  color: var(--text-primary);
  background: var(--bg-page);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

h1, h2, h3, h4, h5 {
  font-family: var(--font-display);
  font-weight: var(--fw-light);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-heading);
  margin: 0;
  color: var(--text-primary);
}

p { margin: 0 0 1em; text-wrap: pretty; }

a { color: inherit; text-decoration: none; }

/* ── Brand utility classes ── */

/* Wide-tracked uppercase label — the "MADE IN ITALY" treatment */
.andolini-overline {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  font-size: var(--fs-overline);
  letter-spacing: var(--ls-overline);
  text-transform: uppercase;
  color: var(--text-secondary);
}

/* Display lockup like the wordmark */
.andolini-wordmark {
  font-family: var(--font-display);
  font-weight: var(--fw-regular);
  letter-spacing: var(--ls-display);
  text-transform: uppercase;
}

/* Editorial serif accent */
.andolini-serif {
  font-family: var(--font-serif);
  font-weight: var(--fw-regular);
}

</style>
<link rel="icon" href="favicon.png">
<script src="react.js"></script>
<script src="react-dom.js"></script>

<style>
  html { scroll-behavior: smooth; }
  body { margin: 0; }
  .kit-collections button:hover .kit-hint { opacity: 1; }
  *::-webkit-scrollbar { width: 10px; }
  *::-webkit-scrollbar-thumb { background: var(--stone-300); border-radius: 99px; }
  @media (max-width: 820px) { .kit-collections { grid-template-columns: repeat(2, 1fr) !important; } .kit-addresses { grid-template-columns: repeat(2, 1fr) !important; } }
</style>

<body>

<div id="root"></div>
<script type="text/babel" src="chrome.js"></script>
<script type="text/babel" src="collections.js"></script>
<script type="text/babel" src="home.js"></script>
<script type="text/babel" src="lightbox.js"></script>
<script type="text/babel">
  const { useState, useRef } = React;
  function App() {
    const [work, setWork] = useState(null);
    const scrollRef = useRef(null);

    const jump = (id) => {
      if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }
      const el = document.getElementById(id);
      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 76, behavior: 'smooth' });
    };

    return (
      <div id="app" ref={scrollRef}>
        <window.KitHeader onJump={jump} transparent={true} />
        <window.KitHome onOpen={setWork} jumpRef={jump} />
        <window.KitContact id="contact" />
        <window.KitLightbox work={work} onClose={() => setWork(null)} onOrder={() => { setWork(null); setTimeout(() => jump('contact'), 60); }} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
